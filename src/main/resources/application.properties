# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/digital_ecosystem

# Server Configuration
server.port=8080

# JWT Configuration
manus.app.jwtSecret=ManusDigitalEcosystemSecretKeyForJWTAuthentication1234567890
manus.app.jwtExpirationMs=3600000
manus.app.jwtRefreshExpirationMs=2592000000

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Logging
logging.level.com.manus.digitalecosystem=DEBUG

# File Uploads
app.upload.base-path=uploads
